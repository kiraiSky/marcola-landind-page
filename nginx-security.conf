# ============================================================
# Marcola Garagem — Nginx security snippet
# Inclui dentro do bloco `server { ... }` que serve o site.
# Aplica também o redirect HTTP→HTTPS e www→non-www.
# ============================================================

# --- Redirect HTTP → HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name marcolagaragem.duckdns.org www.marcolagaragem.duckdns.org;
    return 301 https://marcolagaragem.duckdns.org$request_uri;
}

# --- Redirect www → non-www (sobre HTTPS) ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.marcolagaragem.duckdns.org;
    # ssl_certificate ...;
    # ssl_certificate_key ...;
    return 301 https://marcolagaragem.duckdns.org$request_uri;
}

# --- Servidor principal ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name marcolagaragem.duckdns.org;

    # ssl_certificate /etc/letsencrypt/live/marcolagaragem.duckdns.org/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/marcolagaragem.duckdns.org/privkey.pem;

    root /var/www/marcola-garagem;
    index index.html;

    # --- Security headers ---
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; frame-src https://www.google.com; connect-src 'self' https://kiraiskyn8n.duckdns.org; upgrade-insecure-requests" always;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
